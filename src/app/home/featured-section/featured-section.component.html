<section class="py-5 bg-light">
  <div class="container">
    <div class="d-flex justify-content-between align-items-end mb-4">
      <div>
        <h2 class="h3 fw-bold text-dark mb-2">Featured Products</h2>
        <p class="text-muted">Handpicked selections for audiophiles.</p>
      </div>
      <button class="btn text-primary fw-bold d-flex align-items-center" routerLink="../products">
        View All  <i class="bi bi-arrow-right"></i>
      </button>
    </div>
    <div class="row g-4">
      @for (product of featuredProducts; track product.id) {
        <div class="col-12 col-md-6 col-lg-4">
          <div
            class="card border-light hover-shadow-lg rounded-4 overflow-hidden featured-card"
            [routerLink]="['/products', product.id]"
          >
            <div class="position-relative overflow-hidden">
              <div class="position-absolute top-0 start-0 p-2 z-1">
                <span class="badge bg-primary text-white text-uppercase">{{ product.category }}</span>
              </div>
              <div class="bg-hover overflow-hidden">
                <img
                  [src]="product.image"
                  [alt]="product.name"
                  class="featured-image bg-light"
                />
              </div>
              <div class="add-to-cart-div position-absolute bottom-0 start-0 end-0 p-2">
                <button class="btn btn-primary w-100" (click)="addToCart(product, $event)">
                  Add to Cart <i class="bi bi-bag-dash"></i>
                </button>
              </div>
            </div>
            <div class="card-body d-flex flex-column">
              <div class="d-flex justify-content-between align-items-start mb-2">
                <h3 class="h5 fw-bold text-dark">{{ product.name }}</h3>
                <div class="d-flex align-items-center text-warning">
                  <i class="bi bi-star"></i>
                  <span class="text-muted">{{ product.rating }}</span>
                </div>
              </div>
              <p class="text-muted mb-4">{{ getShortDescription(product) }}</p>
              <div class="mt-auto pt-2 border-top d-flex justify-content-between align-items-center">
                <span class="h4 fw-bold text-primary">${{ product.price.toFixed(2) }}</span>
                <span class="text-muted small">View Details</span>
              </div>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
