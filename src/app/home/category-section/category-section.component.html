<section class="py-5 bg-white">
  <div class="container">
    <div class="text-center mb-4">
      <h2 class="h3 fw-bold mb-4 text-dark">Browse Categories</h2>
      <div class="d-flex justify-content-center gap-3 overflow-auto pb-4 no-scrollbar">
        <button class="btn btn-primary rounded-pill px-4 py-2" routerLink="../products">All Categories</button>
        @for (category of categories; track category) {
          <button class="btn btn-light text-muted rounded-pill px-4 py-2" routerLink="../products">
            {{ category }}
          </button>
        }
      </div>
    </div>
    <div class="row">
      @for (product of categoryHighlights; track product.id) {
        <div class="col-md-4 mb-4">
          <a
            class="img-hover rounded-4 p-4 d-flex flex-column justify-content-end text-decoration-none"
            [routerLink]="['/products', product.id]"
            style="height: 16rem; background: linear-gradient(to bottom right, #2563eb, #4f46e5); position: relative; overflow: hidden;"
          >
            <img
              [src]="product.image"
              [alt]="product.name"
              class="position-absolute top-0 end-0 category-image"
            />
            <h3 class="h5 fw-bold text-white">{{ product.category }}</h3>
            <p class="text-white-50 mb-0">{{ product.brand || product.name }}</p>
          </a>
        </div>
      }
    </div>
  </div>
</section>
