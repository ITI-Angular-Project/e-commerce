<section class="py-24 bg-light">
  <div class="container mx-auto px-3">
    <h2 class="display-4 fw-bold mb-5 text-dark">Best Sellers</h2>
    <div class="row">
      @for (product of bestSellers; track product.id) {
        <div class="col-12 col-sm-6 col-lg-3 mb-4">
          <div
            class="bg-white hover-shadow-lg rounded rounded-3 p-2 transition-all border border-slate-100 position-relative best-seller-card"
            [routerLink]="['/products', product.id]"
          >
            @if (getOriginalPrice(product)) {
              <div class="position-absolute">
                <span class="badge bg-danger text-white text-uppercase px-2 py-1">Top Rated</span>
              </div>
            }
            <div class="bg-hover bg-light rounded overflow-hidden mb-3" style="aspect-ratio: 1;">
              <img
                [src]="product.image"
                [alt]="product.name"
                class="best-seller-image w-100 h-100"
              />
            </div>
            <h4 class="fw-bold mb-1 text-dark">{{ product.name }}</h4>
            <p class="text-muted small mb-2">{{ product.category }}</p>
            <div class="d-flex align-items-center">
              <span class="h5 fw-bold text-dark">${{ product.price.toFixed(2) }}</span>
              @if (getOriginalPrice(product); as originalPrice) {
                <span class="text-muted small text-decoration-line-through ms-2">${{ originalPrice.toFixed(2) }}</span>
              }
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
