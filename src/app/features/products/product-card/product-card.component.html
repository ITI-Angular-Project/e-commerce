<p>product-card works!</p>
<div class="card surface border-0 rounded-4 h-100 product-card overflow-hidden">

  <div class="product-img-wrapper position-relative">
    <img [src]="product.image" [alt]="product.name" class="product-img" />

    <span
      *ngIf="product.badge"
      class="badge position-absolute top-0 start-0 m-2 text-white"
      style="background: var(--color-primary); font-size: 0.65rem"
    >
      {{ product.badge }}
    </span>

    <span
      *ngIf="product.originalPrice"
      class="badge bg-danger position-absolute top-0 end-0 m-2"
      style="font-size: 0.65rem"
    >
      -{{ getDiscountPercent() }}%
    </span>
  </div>

  <div class="card-body d-flex flex-column p-3">

    <span class="category-chip mb-2">{{ product.category }}</span>

    <h6 class="fw-bold mb-1" style="font-size: 0.95rem; color: var(--color-text)">
      {{ product.name }}
    </h6>

    <p class="mb-2 card-description" style="color: var(--color-muted)">
      {{ product.description }}
    </p>

    <div class="d-flex align-items-center gap-2 mb-3">
      <span class="stars">{{ getStars(product.rating) }}</span>
      <span class="fw-semibold" style="font-size: 0.78rem; color: var(--color-text)">{{ product.rating }}</span>
      <span style="font-size: 0.72rem; color: var(--color-muted)">({{ product.reviews }})</span>
    </div>

    <div class="d-flex align-items-center gap-2 mt-auto mb-3">
      <span class="price-now">${{ product.price.toFixed(2) }}</span>
      <span *ngIf="product.originalPrice" class="price-was">
        ${{ product.originalPrice.toFixed(2) }}
      </span>
    </div>

    <div class="d-flex gap-2">

      <a
        class="btn btn-sm flex-grow-1 fw-semibold rounded-3 btn-details"
        [routerLink]="['/products', product.id]"
      >
        Details
      </a>

      <button
        class="btn btn-sm flex-grow-1 fw-semibold rounded-3 btn-cart"
        (click)="onAddToCartClick()"
      >
        Add to Cart
      </button>

    </div>

  </div>
</div>
