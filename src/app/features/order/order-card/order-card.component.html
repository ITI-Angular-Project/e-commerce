<div
  class="card rounded-4 mb-4 order-card-hover overflow-hidden"
  style="border: 1px solid #e5e7eb !important"
>
  <div
    class="card-header bg-light border-bottom p-4 d-flex flex-wrap align-items-center justify-content-between gap-3"
  >
    <div class="d-flex align-items-center flex-wrap gap-4">
      <div class="d-flex flex-column">
        <span class="text-muted fw-bold text-uppercase small-tracking" style="font-size: 10px"
          >Order Number</span
        >
        <span class="fw-bold fs-6 text-primary">{{ order().orderNumber }}</span>
      </div>
      <div class="vr bg-secondary opacity-25" style="width: 1px; height: 32px"></div>
      <div class="d-flex flex-column">
        <span class="text-muted fw-bold text-uppercase small-tracking" style="font-size: 10px"
          >Date Placed</span
        >
        <span class="fw-medium fs-6">{{ order().datePlaced }}</span>
      </div>
      <div class="vr bg-secondary opacity-25" style="width: 1px; height: 32px"></div>
      <div class="d-flex flex-column">
        <span class="text-muted fw-bold text-uppercase small-tracking" style="font-size: 10px"
          >Total</span
        >
        <span class="fw-bold fs-6">{{ order().totalAmount | currency }}</span>
      </div>
    </div>
    <span
      class="badge rounded-pill py-2 px-3 fw-bold text-uppercase"
      style="letter-spacing: 0.05em; font-size: 0.75rem"
      [ngClass]="getStatusBgColor(order().status)"
    >
      {{ order().status }}
    </span>
  </div>

  <div class="card-body p-4 bg-white">
    @for (item of order().items; track $index) {
      <div
        class="d-flex align-items-center gap-4"
        [ngClass]="{ 'pt-4 border-top mt-4': $index > 0 }"
      >
        <div
          class="rounded-3 overflow-hidden border flex-shrink-0 bg-light"
          style="width: 80px; height: 80px"
        >
          <img [src]="item.imageUrl" [alt]="item.name" class="w-100 h-100 object-fit-cover" />
        </div>
        <div class="flex-grow-1">
          <h3 class="fs-6 fw-bold mb-1" style="color: #111827">{{ item.name }}</h3>
          <p class="text-muted small mb-1">Qty: {{ item.quantity }}</p>
          <p class="fs-5 fw-bold mb-0" style="color: #111827">{{ item.price | currency }}</p>
        </div>
      </div>
    }
  </div>

  <div
    class="card-footer bg-light border-top p-4 d-flex justify-content-end gap-3 flex-column flex-sm-row"
  ></div>
</div>
